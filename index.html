<!DOCTYPE html>
<html>
<head>
<title>Shlok AI Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* 🌌 Animated background */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1e1f23);
background-size:400% 400%;
animation:bg 12s infinite;
z-index:-1;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.header{
text-align:center;
padding:12px;
font-weight:bold;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

#chat{
height:calc(100vh - 120px);
overflow-y:auto;
padding:10px;
}

.msg{
max-width:80%;
padding:12px;
margin:8px 0;
border-radius:12px;
white-space:pre-wrap;
word-break:break-word;
}

.user{background:#10a37f;margin-left:auto;}
.bot{background:rgba(255,255,255,0.1);}

.input-area{
position:fixed;
bottom:0;
width:100%;
padding:10px;
background:rgba(0,0,0,0.4);
}

.input-box{
display:flex;
width:95%;
margin:auto;
background:rgba(255,255,255,0.1);
border-radius:25px;
padding:8px;
}

input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
}

button{
background:#10a37f;
border:none;
color:white;
padding:8px;
border-radius:50%;
margin-left:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🚀 Shlok AI PRO MAX</div>

<div id="chat"></div>

<div class="input-area">
<div class="input-box">
<input id="input" placeholder="Ask anything..." />
<button onclick="voice()">🎤</button>
<button onclick="send()">➤</button>
</div>
</div>

<script>

// Detect Hindi
function isHindi(text){
return /[\u0900-\u097F]/.test(text);
}

// Add message
function add(text,type){
let chat=document.getElementById("chat");
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
return d;
}

// SEND
function send(){
let input=document.getElementById("input");
let q=input.value.trim();
if(!q) return;

add(q,"user");
let typing=add("Thinking...","bot");

process(q,typing);

input.value="";
}

// MAIN AI
async function process(q,typing){

try{

// 🧮 MATH PRIORITY
if(/^[0-9+\-*/(). ]+$/.test(q)){
typing.remove();
let result = Function('"use strict";return ('+q+')')();
let ans = "🧮 Answer: " + result;
add(ans,"bot");
speak(ans);
return;
}

// 🌍 LANGUAGE DETECT
let hindi = isHindi(q);

// 🌐 WIKIPEDIA
let res = await fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="+encodeURIComponent(q)+"&format=json&origin=*");
let data = await res.json();

typing.remove();

if(data.query.search.length>0){

let title = data.query.search[0].title;

let sum = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title));
let sumData = await sum.json();

let answer = sumData.extract;

// 🔁 Translate if Hindi
if(hindi){
answer = await translate(answer);
}

add(answer,"bot");
speak(answer);

}else{

let fallback = hindi ? "मुझे सही उत्तर नहीं मिला।" : "I couldn't find an answer.";
add(fallback,"bot");
speak(fallback);

}

}catch{
typing.remove();
add("Error occurred","bot");
}
}

// 🔁 TRANSLATE
async function translate(text){
try{
let res = await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|hi");
let data = await res.json();
return data.responseData.translatedText;
}catch{
return text;
}
}

// 🎤 VOICE
function voice(){
let r=new webkitSpeechRecognition();
r.lang="en-IN";
r.start();
r.onresult=e=>{
document.getElementById("input").value=e.results[0][0].transcript;
send();
};
}

// 🔊 SPEAK
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang="en-IN";
speechSynthesis.speak(s);
}

</script>

</body>
</html>
