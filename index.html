<!DOCTYPE html>
<html>
<link rel="icon" href="logo.png"<meta name="description" content="Shlok AI is a free online AI chatbot that answers questions, helps with studies, coding, and ideas.">
<meta name="keywords" content="Shlok AI, AI chatbot, free AI, ChatGPT alternative, student AI assistant">
<meta name="author" content="Shlok Srivastava">>
  <title>Shlok AI - Free AI Chatbot for Students</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #202123;
      color: white;<h1 style="display:none;">Shlok AI - Free AI Chatbot</h1>
    }

    .sidebar {
      width: 250px;
      height: 100vh;
      background: #171717;
      position: fixed;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .main {
      margin-left: 250px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #6c5ce7;
      align-self: flex-end;
    }

    .bot {
      background: #444654;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #343541;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #10a37f;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0e8c6d;
    }
  </style>
</head>
<body>

<div class="sidebar">
 <div class="logo">
  <img src="logo.png" width="40" style="vertical-align:middle;">
  Shlok AI
</div>
</div>

<div class="main">
  <div id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
function send() {
  let input = document.getElementById("input");
  let chat = document.getElementById("chat");

  let text = input.value;
  if(!text) return;

  // User message
  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = text;
  chat.appendChild(userMsg);

  // Fake AI typing
  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "Thinking...";
  chat.appendChild(botMsg);

  chat.scrollTop = chat.scrollHeight;
  input.value = "";

  // Redirect to real AI after short delay
  setTimeout(() => {
    window.open("https://poe.com/shlok_ai", "_blank");
    botMsg.innerText = "Opening AI response in new tab...";
  }, 1500);
}
</script>

</body>
</html>
