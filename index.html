<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#343541;
      color:white;
    }

    .container { display:flex; height:100vh; }

    .sidebar {
      width:250px;
      background:#202123;
      padding:15px;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    #chat {
      flex:1;
      overflow-y:auto;
      padding:15px;
    }

    .msg {
      padding:12px;
      margin:10px 0;
      border-radius:12px;
      max-width:70%;
      animation:fade 0.3s;
    }

    .user {
      background:#10a37f;
      margin-left:auto;
    }

    .bot {
      background:#444654;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1;}
    }

    .input-area {
      padding:10px;
      background:#40414f;
      display:flex;
      justify-content:center;
    }

    .input-box {
      width:80%;
      display:flex;
      background:#343541;
      border-radius:12px;
      padding:10px;
      align-items:center;
    }

    input {
      flex:1;
      background:transparent;
      border:none;
      color:white;
      outline:none;
      font-size:15px;
    }

    button {
      margin-left:5px;
      background:#10a37f;
      border:none;
      color:white;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover { background:#0e8c6d; }

    .listening {
      background:red !important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse {
      50% { transform:scale(1.2); }
    }

    @media(max-width:768px){
      .sidebar{display:none;}
      .input-box{width:95%;}
    }

  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 Shlok AI</h2>
    <p>Smart Voice Assistant</p>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Type or speak..." />
        <button id="mic" onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

// Load history
window.onload = () => {
  let h = JSON.parse(localStorage.getItem("chat")) || [];
  h.forEach(m => addMessage(m.text, m.type));
};

function save(text,type){
  let h = JSON.parse(localStorage.getItem("chat")) || [];
  h.push({text,type});
  localStorage.setItem("chat", JSON.stringify(h));
}

function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  save(text,"user");

  let typing = addMessage("Thinking...", "bot");
  
  setTimeout(()=>{
    typing.remove();

    let reply = smartAI(text);
    addMessage(reply,"bot");
    save(reply,"bot");

    speak(reply);

  },1000);

  input.value="";
}

function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

// 🎤 Voice Input
function startVoice(){
  let mic=document.getElementById("mic");

  if(!('webkitSpeechRecognition'in window)){
    alert("Voice not supported");
    return;
  }

  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  mic.classList.add("listening");

  rec.onresult=e=>{
    let speech=e.results[0][0].transcript;
    document.getElementById("input").value=speech;
    send();
  };

  rec.onend=()=> mic.classList.remove("listening");
}

// 🔊 Voice Output
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-IN";
  speech.rate=1;
  speechSynthesis.speak(speech);
}

// 🧠 Smart AI Brain
function smartAI(input){

  input=input.toLowerCase();

  if(input.includes("hello")||input.includes("hi"))
    return "Hello! How can I assist you today?";

  if(input.includes("your name"))
    return "I am Shlok AI, your smart assistant.";

  if(input.includes("science"))
    return "Science helps us understand the natural world through experiments and observations.";

  if(input.includes("math"))
    return "Mathematics deals with numbers, logic, and problem-solving used in daily life.";

  if(input.includes("ai"))
    return "Artificial Intelligence allows machines to think, learn, and make decisions like humans.";

  if(!isNaN(input))
    return "The answer is " + eval(input);

  if(input.startsWith("what")||input.startsWith("why")||input.startsWith("how"))
    return "That is a great question. It involves understanding concepts and ideas related to your query. Let me explain: it is based on logic, knowledge, and real-world understanding.";

  let responses=[
    "Interesting question! It can be understood with logic and examples.",
    "I am still learning, but I believe it relates to real-world knowledge.",
    "That’s a thoughtful question. Let me explain it simply.",
    "It depends on the situation, but generally it involves reasoning and understanding."
  ];

  return responses[Math.floor(Math.random()*responses.length)];
}

</script>

</body>
</html>
