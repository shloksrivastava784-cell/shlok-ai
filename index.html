<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI Ultra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
      overflow:hidden;
    }

    /* 🌌 Background */
    body::before {
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:linear-gradient(-45deg,#1e1f23,#343541,#202123,#2a2b32);
      background-size:400% 400%;
      animation:gradient 10s ease infinite;
      z-index:-2;
    }

    @keyframes gradient {
      0%{background-position:0%}
      50%{background-position:100%}
      100%{background-position:0%}
    }

    .header {
      text-align:center;
      padding:12px;
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(10px);
      font-weight:bold;
    }

    #chat {
      height:calc(100vh - 120px);
      overflow-y:auto;
      padding:10px;
    }

    .msg {
      max-width:80%;
      padding:10px;
      margin:8px 0;
      border-radius:12px;
      white-space:pre-wrap;
      word-wrap:break-word;
      line-height:1.5;
    }

    .user { background:#10a37f; margin-left:auto; }
    .bot { background:rgba(255,255,255,0.1); }

    .input-area {
      position:fixed;
      bottom:0;
      width:100%;
      padding:8px;
      backdrop-filter:blur(10px);
    }

    .input-box {
      display:flex;
      width:95%;
      margin:auto;
      background:rgba(255,255,255,0.1);
      border-radius:25px;
      padding:8px;
    }

    input {
      flex:1;
      background:transparent;
      border:none;
      color:white;
      outline:none;
    }

    button {
      background:#10a37f;
      border:none;
      color:white;
      padding:8px;
      border-radius:50%;
      margin-left:5px;
      cursor:pointer;
    }

    .lang-btn {
      position:absolute;
      right:10px;
      top:10px;
      background:#10a37f;
      padding:5px 10px;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
    }

  </style>
</head>

<body>

<div class="header">
  🤖 Shlok AI Ultra
  <div class="lang-btn" onclick="toggleLang()">EN</div>
</div>

<div id="chat"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="startVoice()">🎤</button>
    <button onclick="send()">➤</button>
  </div>
</div>

<script>

// 🌍 Language
let lang="en";

function toggleLang(){
  lang = (lang==="en") ? "hi" : "en";
  document.querySelector(".lang-btn").innerText = lang.toUpperCase();
}

// SEND
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");

  let typing=addMessage(lang==="en"?"Thinking...":"सोच रहा हूँ...","bot");

  ultraAI(text,typing);

  input.value="";
}

// ADD MESSAGE
function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  chat.appendChild(div);

  if(type==="bot"){
    typeEffect(div,text);
  } else {
    div.innerText=text;
  }

  chat.scrollTop=chat.scrollHeight;
  return div;
}

// Typing
function typeEffect(el,text){
  let i=0;
  let interval=setInterval(()=>{
    el.innerText += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },15);
}

// 🌐 Translate
async function translateToHindi(text){
  try{
    let res = await fetch("https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text) + "&langpair=en|hi");
    let data = await res.json();
    return data.responseData.translatedText;
  } catch {
    return text;
  }
}

// 🧠 AI
async function ultraAI(query,typingMsg){

  try{

    // 🧮 MATH DETECTION
    if(/^[0-9+\-*/(). ]+$/.test(query)){
      typingMsg.remove();
      let result = eval(query);
      let ans = (lang==="hi")
        ? "🧮 उत्तर: " + result
        : "🧮 Answer: " + result;

      addMessage(ans,"bot");
      speak(ans);
      return;
    }

    // 🌐 Wikipedia
    let wiki=await fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
    +encodeURIComponent(query)+"&format=json&origin=*");

    let data=await wiki.json();

    typingMsg.remove();

    if(data.query.search.length>0){
      let title=data.query.search[0].title;

      let sum=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"
      +encodeURIComponent(title));

      let sumData=await sum.json();

      let answer = sumData.extract;

      if(lang==="hi"){
        answer = await translateToHindi(answer);
      }

      addMessage(answer,"bot");
      speak(answer);

    } else {

      let fallback = (lang==="hi")
        ? "मुझे उत्तर नहीं मिला, कृपया कुछ और पूछें।"
        : "I couldn't find an answer.";

      addMessage(fallback,"bot");
      speak(fallback);
    }

  } catch {
    typingMsg.remove();
  }
}

// 🎤 Voice input
function startVoice(){
  let rec=new webkitSpeechRecognition();
  rec.lang = (lang==="hi") ? "hi-IN" : "en-IN";
  rec.start();

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };
}

// 🔊 Speak
function speak(text){
  let s=new SpeechSynthesisUtterance(text);
  s.lang = (lang==="hi") ? "hi-IN" : "en-IN";
  speechSynthesis.speak(s);
}

</script>

</body>
</html>
