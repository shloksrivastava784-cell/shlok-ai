<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI Pro</title>

  <style>
    body {
      margin:0;
      font-family: "Segoe UI", Arial;
      color:white;
      overflow:hidden;
    }

    /* 🌌 Animated Background */
    body::before {
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:linear-gradient(-45deg,#1e1f23,#343541,#202123,#2a2b32);
      background-size:400% 400%;
      animation:gradient 10s ease infinite;
      z-index:-2;
    }

    @keyframes gradient {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .container { display:flex; height:100vh; }

    /* 📂 Sidebar */
    .sidebar {
      width:260px;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
      padding:10px;
      overflow-y:auto;
    }

    .sidebar h2 { text-align:center; }

    .chat-item {
      padding:10px;
      margin:5px 0;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      cursor:pointer;
    }

    .chat-item:hover { background:rgba(255,255,255,0.2); }

    /* 💬 Chat */
    .main { flex:1; display:flex; flex-direction:column; }

    #chat {
      flex:1;
      overflow-y:auto;
      padding:20px;
    }

    .msg {
      max-width:70%;
      padding:12px;
      margin:10px 0;
      border-radius:15px;
      backdrop-filter:blur(10px);
      white-space:pre-line;
    }

    .user {
      background:#10a37f;
      margin-left:auto;
    }

    .bot {
      background:rgba(255,255,255,0.1);
    }

    /* ⌨️ Input */
    .input-area {
      padding:10px;
      display:flex;
      justify-content:center;
      backdrop-filter:blur(10px);
    }

    .input-box {
      width:90%;
      max-width:700px;
      display:flex;
      background:rgba(255,255,255,0.1);
      border-radius:25px;
      padding:10px;
    }

    input {
      flex:1;
      background:transparent;
      border:none;
      color:white;
      outline:none;
    }

    button {
      background:#10a37f;
      border:none;
      color:white;
      padding:10px;
      border-radius:50%;
      margin-left:5px;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 Shlok AI</h2>
    <div id="history"></div>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Ask anything..." />
        <button onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

// Load history
window.onload = loadHistory;

function loadHistory(){
  let data = JSON.parse(localStorage.getItem("chat")) || [];
  data.forEach(m => addMessage(m.text, m.type));
  updateSidebar(data);
}

function save(text,type){
  let data = JSON.parse(localStorage.getItem("chat")) || [];
  data.push({text,type});
  localStorage.setItem("chat", JSON.stringify(data));
}

// Send
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  save(text,"user");

  let typing=addMessage("Thinking...","bot");

  hybridAI(text,typing);

  input.value="";
}

// Add message
function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  chat.appendChild(div);

  if(type==="bot"){
    typeEffect(div,text);
  } else {
    div.innerText=text;
  }

  chat.scrollTop=chat.scrollHeight;
  return div;
}

// 🤖 Typing effect
function typeEffect(el,text){
  let i=0;
  let interval=setInterval(()=>{
    el.innerText += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },20);
}

// Sidebar
function updateSidebar(data){
  let history=document.getElementById("history");
  history.innerHTML="";
  data.slice(-10).forEach(item=>{
    let div=document.createElement("div");
    div.className="chat-item";
    div.innerText=item.text.substring(0,20);
    history.appendChild(div);
  });
}

// Hybrid AI
async function hybridAI(query,typingMsg){

  try{
    let res=await fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
    +encodeURIComponent(query)+"&format=json&origin=*");

    let data=await res.json();
    typingMsg.remove();

    if(data.query.search.length>0){
      let title=data.query.search[0].title;

      let sum=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title));
      let sumData=await sum.json();

      let answer=sumData.extract + "\n\n💡 " + smartAI(query);

      addMessage(answer,"bot");
      save(answer,"bot");
    } else {
      let fallback=smartAI(query);
      addMessage(fallback,"bot");
      save(fallback,"bot");
    }

  }catch{
    typingMsg.remove();
    let fallback=smartAI(query);
    addMessage(fallback,"bot");
    save(fallback,"bot");
  }
}

// Voice
function startVoice(){
  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };
}

// Speak
function speak(text){
  let s=new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(s);
}

// Smart AI
function smartAI(input){
  return "This topic can be understood better with logic and real-world understanding.";
}

</script>

</body>
</html>
