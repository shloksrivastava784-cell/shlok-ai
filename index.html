

<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    .header {
      padding: 15px;
      background: #202123;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      text-align: center;
      margin-top: 100px;
    }

    .box {
      background: #444654;
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 25px;
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0e8c6d;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="header">
  🤖 Shlok AI
</div>

<div class="container">
  <div class="box">
    <h1>Welcome to Shlok AI</h1>
    <p>Your personal AI assistant</p>

    <button class="btn" onclick="openAI()">
      Start Chatting
    </button>
  </div>
</div>

<footer>
  © Shlok Srivastava
</footer>

<script>
function openAI() {
  window.open("https://poe.com/shlok_ai", "_blank");
}
</script>

</body>
</html>
