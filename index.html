
<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #202123;
      color: white;
    }

    .sidebar {
      width: 250px;
      height: 100vh;
      background: #171717;
      position: fixed;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .main {
      margin-left: 250px;
      padding: 40px;
      text-align: center;
    }

    .chat-box {
      background: #343541;
      padding: 40px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
    }

    input {
      width: 80%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
    }

    button {
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: #10a37f;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0e8c6d;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🤖 Shlok AI</div>
  <p>AI Assistant</p>
</div>

<div class="main">
  <div class="chat-box">
    <h1>Welcome to Shlok AI</h1>
    <p>Ask anything and get intelligent answers</p>

    <input id="q" placeholder="Type your question..." />
    <br>
    <button onclick="go()">Ask AI</button>

    <div class="footer">
      © Shlok Srivastava
    </div>
  </div>
</div>

<script>
function go() {
  window.open("https://poe.com/shlok_ai", "_blank");
}
</script>

</body>
</html>
