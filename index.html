<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:#1e1f23;
      color:white;
    }

    /* Header */
    .header {
      text-align:center;
      padding:12px;
      background:#202123;
      font-size:18px;
      font-weight:bold;
    }

    /* Chat area */
    #chat {
      height:calc(100vh - 110px);
      overflow-y:auto;
      padding:10px;
    }

    .msg {
      max-width:80%;
      padding:10px;
      margin:8px 0;
      border-radius:12px;
      white-space:pre-wrap;
      word-wrap:break-word;
      overflow-wrap:break-word;
      line-height:1.4;
    }

    .user {
      background:#10a37f;
      margin-left:auto;
    }

    .bot {
      background:#2a2b32;
    }

    /* Input */
    .input-area {
      position:fixed;
      bottom:0;
      width:100%;
      padding:8px;
      background:#202123;
      display:flex;
      justify-content:center;
    }

    .input-box {
      width:95%;
      display:flex;
      background:#2a2b32;
      border-radius:25px;
      padding:8px;
    }

    input {
      flex:1;
      background:transparent;
      border:none;
      color:white;
      outline:none;
      font-size:14px;
      padding-left:10px;
    }

    button {
      background:#10a37f;
      border:none;
      color:white;
      padding:8px 10px;
      border-radius:50%;
      margin-left:5px;
      font-size:14px;
    }

  </style>
</head>

<body>

<div class="header">🤖 Shlok AI</div>

<div id="chat"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="startVoice()">🎤</button>
    <button onclick="send()">➤</button>
  </div>
</div>

<script>

// Load chat
window.onload = () => {
  let data = JSON.parse(localStorage.getItem("chat")) || [];
  data.forEach(m => addMessage(m.text, m.type));
};

// Save
function save(text,type){
  let data = JSON.parse(localStorage.getItem("chat")) || [];
  data.push({text,type});
  localStorage.setItem("chat", JSON.stringify(data));
}

// Send
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  save(text,"user");

  let typing=addMessage("Thinking...","bot");

  hybridAI(text,typing);

  input.value="";
}

// Add message
function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  chat.appendChild(div);

  if(type==="bot"){
    typeEffect(div,text);
  } else {
    div.innerText=text;
  }

  chat.scrollTop=chat.scrollHeight;
  return div;
}

// Typing animation
function typeEffect(el,text){
  let i=0;
  let interval=setInterval(()=>{
    el.innerText += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },15);
}

// Hybrid AI
async function hybridAI(query,typingMsg){

  try{
    let res=await fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
    +encodeURIComponent(query)+"&format=json&origin=*");

    let data=await res.json();
    typingMsg.remove();

    if(data.query.search.length>0){
      let title=data.query.search[0].title;

      let sum=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title));
      let sumData=await sum.json();

      let answer=sumData.extract + "\n\n💡 " + smartAI(query);

      addMessage(answer,"bot");
      save(answer,"bot");
      speak(answer);
    } else {
      let fallback=smartAI(query);
      addMessage(fallback,"bot");
      save(fallback,"bot");
      speak(fallback);
    }

  }catch{
    typingMsg.remove();
    let fallback=smartAI(query);
    addMessage(fallback,"bot");
    save(fallback,"bot");
    speak(fallback);
  }
}

// Voice input
function startVoice(){
  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };
}

// Voice output
function speak(text){
  let s=new SpeechSynthesisUtterance(text);
  s.lang="en-IN";
  speechSynthesis.speak(s);
}

// Smart AI
function smartAI(input){
  return "This topic can be understood using general knowledge and logic.";
}

</script>

</body>
</html>
