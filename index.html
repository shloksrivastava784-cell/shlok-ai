<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>

  <style>
    body {margin:0;font-family:Arial;background:#343541;color:white;}
    .container{display:flex;height:100vh;}
    .sidebar{width:250px;background:#202123;padding:15px;}
    .main{flex:1;display:flex;flex-direction:column;}
    #chat{flex:1;overflow-y:auto;padding:15px;}

    .msg{
      padding:12px;margin:10px 0;border-radius:12px;
      max-width:70%;animation:fade 0.3s;
    }

    .user{background:#10a37f;margin-left:auto;}
    .bot{background:#444654;}

    @keyframes fade{
      from{opacity:0;transform:translateY(10px);}
      to{opacity:1;}
    }

    .input-area{
      padding:10px;background:#40414f;
      display:flex;justify-content:center;
    }

    .input-box{
      width:80%;display:flex;background:#343541;
      border-radius:12px;padding:10px;
    }

    input{
      flex:1;background:transparent;
      border:none;color:white;outline:none;
    }

    button{
      margin-left:5px;background:#10a37f;
      border:none;color:white;padding:10px;
      border-radius:8px;
    }

    .listening{
      background:red!important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{50%{transform:scale(1.2);}}
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 Shlok AI</h2>
    <p>Voice AI Assistant</p>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Type or speak..." />
        <button id="mic" onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");

  let typing=addMessage("Thinking...","bot");

  setTimeout(()=>{
    typing.remove();
    let reply=smartAI(text);
    addMessage(reply,"bot");
    speak(reply);
  },1000);

  input.value="";
}

function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

// 🎤 Voice Input
function startVoice(){
  let mic=document.getElementById("mic");

  if(!('webkitSpeechRecognition'in window)){
    alert("Voice not supported");
    return;
  }

  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  mic.classList.add("listening");

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };

  rec.onend=()=> mic.classList.remove("listening");
}

// 🔊 Voice Output
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-IN";
  speechSynthesis.speak(speech);
}

// 🧠 Smart AI
function smartAI(input){

  input=input.toLowerCase();

  if(input.includes("hello")||input.includes("hi"))
    return "Hello! How can I help you today?";

  if(input.includes("science"))
    return "Science is the study of the natural world through experiments and observations.";

  if(input.includes("ai"))
    return "Artificial Intelligence allows machines to think and learn like humans.";

  if(input.includes("math"))
    return "Mathematics involves numbers, logic, and problem-solving.";

  if(!isNaN(input))
    return "The answer is " + eval(input);

  if(input.startsWith("what")||input.startsWith("why")||input.startsWith("how"))
    return "That is a great question. It involves understanding concepts and real-world knowledge.";

  return "Interesting question! I am still learning and improving.";
}

</script>

</body>
</html>
