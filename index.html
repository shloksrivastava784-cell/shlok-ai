<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI - Free AI Chatbot</title>

  <meta name="description" content="Shlok AI is a free AI chatbot with voice input and smart answers.">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #202123;
      padding: 15px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      max-width: 75%;
      animation: fade 0.3s ease;
    }

    .user {
      background: #10a37f;
      margin-left: auto;
    }

    .bot {
      background: #444654;
    }

    @keyframes fade {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1;}
    }

    .input-area {
      padding: 10px;
      background: #40414f;
      display: flex;
      justify-content: center;
    }

    .input-box {
      width: 80%;
      display: flex;
      background: #343541;
      border-radius: 10px;
      padding: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      outline: none;
      font-size: 15px;
    }

    button {
      margin-left: 5px;
      background: #10a37f;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0e8c6d;
    }

    .listening {
      background: red !important;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      50% { transform: scale(1.2); }
    }

    @media(max-width: 768px) {
      .sidebar { display: none; }
      .input-box { width: 95%; }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 Shlok AI</h2>
    <p>AI Assistant</p>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Type or speak..." />
        <button id="mic" onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

// Load chat history
window.onload = function() {
  let history = JSON.parse(localStorage.getItem("chat")) || [];
  history.forEach(m => addMessage(m.text, m.type));
};

function saveMessage(text, type) {
  let history = JSON.parse(localStorage.getItem("chat")) || [];
  history.push({text, type});
  localStorage.setItem("chat", JSON.stringify(history));
}

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  saveMessage(text, "user");

  let botText = "Opening AI in new tab for best answer...";
  addMessage(botText, "bot");
  saveMessage(botText, "bot");

  input.value = "";

  // Open Poe with question
  let url = "https://poe.com/shlok_ai?q=" + encodeURIComponent(text);

  setTimeout(() => {
    window.open(url, "_blank");
  }, 800);
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// Voice input
function startVoice() {
  let mic = document.getElementById("mic");

  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported in this browser");
    return;
  }

  let recognition = new webkitSpeechRecognition();
  recognition.lang = "en-IN";
  recognition.start();

  mic.classList.add("listening");

  recognition.onresult = function(e) {
    let speech = e.results[0][0].transcript;
    document.getElementById("input").value = speech;
    send();
  };

  recognition.onend = function() {
    mic.classList.remove("listening");
  };
}

</script>

</body>
</html>
