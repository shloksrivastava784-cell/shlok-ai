<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>

  <style>
    body {
      margin:0;
      font-family: "Segoe UI", Arial;
      background:#1e1f23;
      color:white;
    }

    .header {
      background:#202123;
      padding:15px;
      text-align:center;
      font-size:18px;
      font-weight:bold;
      border-bottom:1px solid #333;
    }

    #chat {
      height:calc(100vh - 120px);
      overflow-y:auto;
      padding:20px;
    }

    .msg {
      max-width:70%;
      padding:12px 15px;
      margin:10px 0;
      border-radius:15px;
      line-height:1.5;
      animation:fade 0.3s ease;
      white-space:pre-line;
    }

    .user {
      background:#10a37f;
      margin-left:auto;
    }

    .bot {
      background:#2a2b32;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1;}
    }

    .input-area {
      position:fixed;
      bottom:0;
      width:100%;
      background:#202123;
      padding:10px;
      border-top:1px solid #333;
      display:flex;
      justify-content:center;
    }

    .input-box {
      width:90%;
      max-width:700px;
      display:flex;
      background:#2a2b32;
      border-radius:25px;
      padding:10px;
      align-items:center;
    }

    input {
      flex:1;
      background:transparent;
      border:none;
      color:white;
      outline:none;
      font-size:15px;
      padding-left:10px;
    }

    button {
      background:#10a37f;
      border:none;
      color:white;
      padding:10px 14px;
      border-radius:50%;
      margin-left:5px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover {
      background:#0e8c6d;
    }

    .listening {
      background:red !important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse {
      50% { transform:scale(1.2); }
    }
  </style>
</head>

<body>

<div class="header">🤖 Shlok AI</div>

<div id="chat"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <button id="mic" onclick="startVoice()">🎤</button>
    <button onclick="send()">➤</button>
  </div>
</div>

<script>

// SEND
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");

  let typing=addMessage("Thinking... 🤖","bot");

  hybridAI(text, typing);

  input.value="";
}

// ADD MESSAGE
function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

// HYBRID AI
async function hybridAI(query, typingMsg){

  try{
    let searchUrl="https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
      + encodeURIComponent(query) + "&format=json&origin=*";

    let searchRes=await fetch(searchUrl);
    let searchData=await searchRes.json();

    typingMsg.remove();

    if(searchData.query.search.length>0){

      let title=searchData.query.search[0].title;

      let summaryUrl="https://en.wikipedia.org/api/rest_v1/page/summary/"
        + encodeURIComponent(title);

      let summaryRes=await fetch(summaryUrl);
      let summaryData=await summaryRes.json();

      let answer=summaryData.extract;

      answer += "\n\n💡 " + smartAI(query);

      addMessage(answer,"bot");
      speak(answer);

    } else {
      let fallback=smartAI(query);
      addMessage(fallback,"bot");
      speak(fallback);
    }

  }catch{
    typingMsg.remove();
    let fallback=smartAI(query);
    addMessage(fallback,"bot");
    speak(fallback);
  }
}

// VOICE INPUT
function startVoice(){
  let mic=document.getElementById("mic");

  if(!('webkitSpeechRecognition'in window)){
    alert("Voice not supported");
    return;
  }

  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  mic.classList.add("listening");

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };

  rec.onend=()=> mic.classList.remove("listening");
}

// VOICE OUTPUT
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-IN";
  speechSynthesis.speak(speech);
}

// SMART AI
function smartAI(input){
  input=input.toLowerCase();

  if(input.includes("hello"))
    return "Hello! I am your AI assistant.";

  if(input.includes("ai"))
    return "AI allows machines to think and learn.";

  return "This is an interesting topic. Try asking more specifically.";
}

</script>

</body>
</html>
