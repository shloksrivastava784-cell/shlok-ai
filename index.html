<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>

  <style>
    body { margin:0; font-family:Arial; background:#343541; color:white;}
    .container{display:flex;height:100vh;}
    .sidebar{width:250px;background:#202123;padding:15px;}
    .main{flex:1;display:flex;flex-direction:column;}
    #chat{flex:1;overflow-y:auto;padding:15px;}

    .msg{
      padding:12px;margin:10px 0;border-radius:12px;
      max-width:70%;animation:fade 0.3s;
    }

    .user{background:#10a37f;margin-left:auto;}
    .bot{background:#444654;}

    @keyframes fade{
      from{opacity:0;transform:translateY(10px);}
      to{opacity:1;}
    }

    .input-area{
      padding:10px;background:#40414f;
      display:flex;justify-content:center;
    }

    .input-box{
      width:80%;display:flex;background:#343541;
      border-radius:12px;padding:10px;
    }

    input{
      flex:1;background:transparent;
      border:none;color:white;outline:none;
    }

    button{
      margin-left:5px;background:#10a37f;
      border:none;color:white;padding:10px;
      border-radius:8px;
      cursor:pointer;
    }

    .listening{
      background:red!important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{50%{transform:scale(1.2);}}
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 Shlok AI</h2>
    <p>Hybrid AI (Internet + Smart)</p>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Ask anything..." />
        <button id="mic" onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

// SEND MESSAGE
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");

  let typing=addMessage("Thinking + Searching... 🤖🌐","bot");

  hybridAI(text, typing);

  input.value="";
}

// ADD MESSAGE
function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

// 🔥 HYBRID AI (WIKIPEDIA + SMART)
async function hybridAI(query, typingMsg){

  try{
    let url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(query);
    let res = await fetch(url);
    let data = await res.json();

    typingMsg.remove();

    let answer = "";

    if(data.extract){
      answer = data.extract;

      // enhance with smart AI
      answer += "\n\n💡 Explanation: " + smartAI(query);
    }else{
      answer = smartAI(query);
    }

    addMessage(answer,"bot");
    speak(answer);

  }catch{
    typingMsg.remove();
    let fallback = smartAI(query);
    addMessage(fallback,"bot");
    speak(fallback);
  }
}

// 🎤 Voice Input
function startVoice(){
  let mic=document.getElementById("mic");

  if(!('webkitSpeechRecognition'in window)){
    alert("Voice not supported");
    return;
  }

  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  mic.classList.add("listening");

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };

  rec.onend=()=> mic.classList.remove("listening");
}

// 🔊 Voice Output
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-IN";
  speech.rate=1;
  speechSynthesis.speak(speech);
}

// 🧠 SMART AI BRAIN
function smartAI(input){

  input=input.toLowerCase();

  if(input.includes("hello")||input.includes("hi"))
    return "Hello! I am your AI assistant. Ask me anything.";

  if(input.includes("ai"))
    return "AI stands for Artificial Intelligence, which allows machines to learn and think.";

  if(input.includes("science"))
    return "Science helps us understand the world through experiments and observations.";

  if(!isNaN(input))
    return "The answer is " + eval(input);

  if(input.startsWith("why"))
    return "This happens due to logical or scientific reasons depending on the situation.";

  if(input.startsWith("how"))
    return "It works through a process or steps which explain the concept clearly.";

  if(input.startsWith("what"))
    return "This is a concept that can be understood using knowledge and real-world understanding.";

  let replies=[
    "This is an interesting topic. It can be better understood with more details.",
    "I am still learning, but this relates to general knowledge and logic.",
    "Try asking in a more specific way for a better answer.",
    "This question involves understanding concepts and real-world ideas."
  ];

  return replies[Math.floor(Math.random()*replies.length)];
}

</script>

</body>
</html>
