<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI - Free AI Chatbot</title>

  <!-- SEO -->
  <meta name="description" content="Shlok AI is a free online AI chatbot that answers questions, helps with studies, coding, and ideas.">
  <meta name="keywords" content="Shlok AI, AI chatbot, free AI, ChatGPT alternative, student AI assistant">
  <meta name="author" content="Shlok Srivastava">

  <!-- Favicon -->
  <link rel="icon" href="logo.png">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #202123;
      color: white;
    }

    .sidebar {
      width: 250px;
      height: 100vh;
      background: #171717;
      position: fixed;
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .logo img {
      width: 35px;
      vertical-align: middle;
      margin-right: 8px;
    }

    .main {
      margin-left: 250px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #6c5ce7;
      align-self: flex-end;
    }

    .bot {
      background: #444654;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #343541;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #5a4bd1;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      padding: 5px;
    }
  </style>
</head>

<body>

<!-- Hidden SEO heading -->
<h1 style="display:none;">Shlok AI Free Chatbot</h1>

<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    Shlok AI
  </div>
  <p>Your personal AI assistant</p>
</div>

<div class="main">
  <div id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="send()">Send</button>
  </div>

  <div class="footer">
    © Shlok Srivastava
  </div>
</div>

<script>
function send() {
  let input = document.getElementById("input");
  let chat = document.getElementById("chat");

  let text = input.value;
  if (!text) return;

  // User message
  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = text;
  chat.appendChild(userMsg);

  // AI placeholder
  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "Opening AI...";
  chat.appendChild(botMsg);

  chat.scrollTop = chat.scrollHeight;
  input.value = "";

  // Open real AI
  setTimeout(() => {
    window.open("https://poe.com/shlok_ai", "_blank");
  }, 1000);
}
</script>

</body>
</html>
