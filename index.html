<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #202123;
      padding: 10px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      padding: 15px;
      display: flex;
    }

    .user {
      justify-content: flex-end;
    }

    .bot {
      background: #444654;
    }

    .bubble {
      max-width: 700px;
    }

    .input-area {
      padding: 10px;
      background: #40414f;
      display: flex;
      justify-content: center;
    }

    .input-box {
      width: 70%;
      display: flex;
      background: #343541;
      border-radius: 10px;
      padding: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      outline: none;
      font-size: 15px;
    }

    button {
      margin-left: 5px;
      background: #10a37f;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0e8c6d;
    }

    /* Voice animation */
    .listening {
      animation: pulse 1s infinite;
      background: red !important;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h3>🤖 Shlok AI</h3>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Type or speak..." />
        <button id="mic" onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

function send() {
  let input = document.getElementById("input");
  let chat = document.getElementById("chat");

  let text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  let botMsg = addMessage("Thinking...", "bot");

  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    let reply = generateReply(text);
    typeText(botMsg, reply);
    speak(reply);
  }, 800);
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "msg " + type;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  msg.appendChild(bubble);
  chat.appendChild(msg);

  return bubble;
}

function generateReply(text) {
  let t = text.toLowerCase();

  if (t.includes("hello") || t.includes("hi"))
    return "Hello! How can I help you?";
  if (t.includes("who are you"))
    return "I am Shlok AI, your assistant.";
  if (t.includes("study"))
    return "Study daily and revise regularly.";
  if (t.includes("code"))
    return "Practice coding and build projects.";
  if (t.includes("india"))
    return "India is a beautiful country with rich culture.";

  return "I am learning. You said: " + text;
}

// Typing effect
function typeText(el, text) {
  el.innerText = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      el.innerText += text.charAt(i);
      i++;
      setTimeout(typing, 15);
    }
  }

  typing();
}

// Voice input
function startVoice() {
  let mic = document.getElementById("mic");

  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported");
    return;
  }

  let recognition = new webkitSpeechRecognition();
  recognition.lang = "en-IN"; // supports Hindi-English mix
  recognition.start();

  mic.classList.add("listening");

  recognition.onresult = function(event) {
    let speech = event.results[0][0].transcript;
    document.getElementById("input").value = speech;
    send();
  };

  recognition.onend = function() {
    mic.classList.remove("listening");
  };
}

// AI speaking
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-IN"; // Hindi + English mix
  speech.rate = 1;

  speechSynthesis.speak(speech);
}

</script>

</body>
</html>
