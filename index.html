<!DOCTYPE html>
<html>
<head>
<title>Shlok AI FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#1e1f23;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:12px;
background:#202123;
position:relative;
z-index:10;
}

.lang{
background:#10a37f;
padding:6px 12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* CHAT */
#chat{
height:calc(100vh - 120px);
overflow-y:auto;
padding:10px;
}

.msg{
max-width:75%;
padding:10px;
margin:8px 0;
border-radius:10px;
white-space:pre-wrap;
word-break:break-word;
}

.user{background:#10a37f;margin-left:auto;}
.bot{background:#2a2b32;}

/* INPUT */
.input-area{
position:fixed;
bottom:0;
width:100%;
background:#202123;
padding:10px;
}

.input-box{
display:flex;
width:95%;
margin:auto;
background:#2a2b32;
border-radius:20px;
padding:8px;
}

input{
flex:1;
background:none;
border:none;
color:white;
outline:none;
}

button{
background:#10a37f;
border:none;
color:white;
padding:8px;
border-radius:50%;
margin-left:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>🤖 Shlok AI FINAL</div>
<div class="lang" onclick="toggleLang()">EN</div>
</div>

<div id="chat"></div>

<div class="input-area">
<div class="input-box">
<input id="input" placeholder="Ask anything..." />
<button onclick="voice()">🎤</button>
<button onclick="send()">➤</button>
</div>
</div>

<script>

let lang="en";

function toggleLang(){
lang = (lang==="en") ? "hi" : "en";
document.querySelector(".lang").innerText = lang.toUpperCase();
}

// ADD MESSAGE
function add(text,type){
let chat=document.getElementById("chat");
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
return d;
}

// SEND
function send(){
let q=document.getElementById("input").value.trim();
if(!q) return;

add(q,"user");
let typing = add("Thinking...","bot");

process(q,typing);

document.getElementById("input").value="";
}

// MAIN FIXED AI
async function process(q,typing){

try{

// 🔥 FIX 1: EXTRACT MATH FROM SENTENCE
let mathMatch = q.match(/[0-9+\-*/(). ]+/);

if(mathMatch){
try{
let result = Function('"use strict";return ('+mathMatch[0]+')')();
typing.innerText = (lang==="hi"?"उत्तर: ":"Answer: ") + result;
speak(typing.innerText);
return;
}catch{}
}

// 🌍 HINDI DETECT
let isHindi = /[\u0900-\u097F]/.test(q);

// 🌐 WIKI SEARCH
let res = await fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="+encodeURIComponent(q)+"&format=json&origin=*");
let data = await res.json();

if(data.query.search.length === 0){
typing.innerText = isHindi
? "मुझे उत्तर नहीं मिला।"
: "No answer found.";
speak(typing.innerText);
return;
}

let title = data.query.search[0].title;

let sum = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title));
let sumData = await sum.json();

let answer = sumData.extract;

// 🔁 TRANSLATE
if(lang==="hi" || isHindi){
answer = await translate(answer);
}

typing.innerText = answer;
speak(answer);

}catch{
typing.innerText="Error";
}
}

// TRANSLATE
async function translate(text){
try{
let res = await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|hi");
let data = await res.json();
return data.responseData.translatedText;
}catch{
return text;
}
}

// VOICE INPUT
function voice(){
let r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
r.lang = (lang==="hi") ? "hi-IN" : "en-IN";
r.start();

r.onresult = e=>{
document.getElementById("input").value = e.results[0][0].transcript;
send();
};
}

// SPEAK
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang = (lang==="hi") ? "hi-IN" : "en-IN";
speechSynthesis.cancel();
speechSynthesis.speak(s);
}

</script>

</body>
</html>
