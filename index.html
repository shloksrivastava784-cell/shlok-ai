<!DOCTYPE html>
<html>
<head>
  <title>Shlok AI - Smart Internet AI</title>

  <style>
    body { margin:0; font-family:Arial; background:#343541; color:white;}
    .container{display:flex;height:100vh;}
    .sidebar{width:250px;background:#202123;padding:15px;}
    .main{flex:1;display:flex;flex-direction:column;}
    #chat{flex:1;overflow-y:auto;padding:15px;}

    .msg{
      padding:12px;margin:10px 0;border-radius:12px;
      max-width:70%;animation:fade 0.3s;
      white-space:pre-line;
    }

    .user{background:#10a37f;margin-left:auto;}
    .bot{background:#444654;}

    @keyframes fade{
      from{opacity:0;transform:translateY(10px);}
      to{opacity:1;}
    }

    .input-area{
      padding:10px;background:#40414f;
      display:flex;justify-content:center;
    }

    .input-box{
      width:80%;display:flex;background:#343541;
      border-radius:12px;padding:10px;
    }

    input{
      flex:1;background:transparent;
      border:none;color:white;outline:none;
      font-size:15px;
    }

    button{
      margin-left:5px;background:#10a37f;
      border:none;color:white;padding:10px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{background:#0e8c6d;}

    .listening{
      background:red!important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{50%{transform:scale(1.2);}}

    @media(max-width:768px){
      .sidebar{display:none;}
      .input-box{width:95%;}
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 Shlok AI</h2>
    <p>Internet + Smart AI</p>
  </div>

  <div class="main">

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" placeholder="Ask anything..." />
        <button id="mic" onclick="startVoice()">🎤</button>
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>

</div>

<script>

// SEND MESSAGE
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");

  let typing=addMessage("Thinking + Searching... 🤖🌐","bot");

  hybridAI(text, typing);

  input.value="";
}

// ADD MESSAGE
function addMessage(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

// 🔥 HYBRID AI (FIXED WIKIPEDIA + SMART)
async function hybridAI(query, typingMsg){

  try{

    // STEP 1: Search Wikipedia properly
    let searchUrl = "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=" 
      + encodeURIComponent(query) + "&format=json&origin=*";

    let searchRes = await fetch(searchUrl);
    let searchData = await searchRes.json();

    typingMsg.remove();

    if(searchData.query.search.length > 0){

      let title = searchData.query.search[0].title;

      // STEP 2: Get summary
      let summaryUrl = "https://en.wikipedia.org/api/rest_v1/page/summary/" 
        + encodeURIComponent(title);

      let summaryRes = await fetch(summaryUrl);
      let summaryData = await summaryRes.json();

      let answer = summaryData.extract;

      // Add smart explanation
      answer += "\n\n💡 Explanation: " + smartAI(query);

      addMessage(answer,"bot");
      speak(answer);

    } else {

      let fallback = smartAI(query);
      addMessage(fallback,"bot");
      speak(fallback);

    }

  } catch {

    typingMsg.remove();

    let fallback = smartAI(query);
    addMessage(fallback,"bot");
    speak(fallback);
  }
}

// 🎤 Voice Input
function startVoice(){
  let mic=document.getElementById("mic");

  if(!('webkitSpeechRecognition'in window)){
    alert("Voice not supported");
    return;
  }

  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();

  mic.classList.add("listening");

  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };

  rec.onend=()=> mic.classList.remove("listening");
}

// 🔊 Voice Output
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-IN";
  speech.rate=1;
  speechSynthesis.speak(speech);
}

// 🧠 SMART AI
function smartAI(input){

  input=input.toLowerCase();

  if(input.includes("hello")||input.includes("hi"))
    return "Hello! I am your AI assistant.";

  if(input.includes("ai"))
    return "AI means machines that can think and learn like humans.";

  if(input.includes("science"))
    return "Science helps us understand the world through experiments.";

  if(!isNaN(input))
    return "The answer is " + eval(input);

  if(input.startsWith("why"))
    return "This happens due to logical or scientific reasons.";

  if(input.startsWith("how"))
    return "It works through steps or processes.";

  if(input.startsWith("what"))
    return "This is a concept based on knowledge and understanding.";

  let replies=[
    "This is an interesting topic. Try asking more specifically.",
    "I am still improving, but this relates to general knowledge.",
    "This involves real-world concepts and logic.",
    "Try asking in a simpler way for better results."
  ];

  return replies[Math.floor(Math.random()*replies.length)];
}

</script>

</body>
</html>
